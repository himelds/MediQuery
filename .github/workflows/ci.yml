name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install CPU-only PyTorch
        # Pinned to match backend/Dockerfile — avoids pulling the GPU build (~2 GB).
        run: pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install application and dev dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check backend tests

      - name: Run unit tests
        # API smoke tests (test_api_smoke.py) depend on a pre-built ChromaDB
        # index, which is built on the host and baked into the backend image,
        # but is not regenerated in CI. We run only the unit tests here.
        run: pytest tests/test_auth.py tests/test_roles.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Gitleaks needs full history

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
